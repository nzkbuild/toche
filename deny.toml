# Toche dependency and licence policy enforcement
# Generated by M02 — Lock reuse and dependency policy
# Validation: cargo deny check

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "x86_64-apple-darwin" },
    { triple = "aarch64-apple-darwin" },
]

[output]

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-3-Clause",
    "ISC",
    "Unlicense",
    "Zlib",
    "BSL-1.0",
    "Unicode-3.0",
    "Apache-2.0 WITH LLVM-exception",
]
confidence-threshold = 0.8
exceptions = [
    { allow = ["CDLA-Permissive-2.0"], name = "webpki-roots" },
    { allow = ["ISC"], name = "rustls-webpki" },
    { allow = ["ISC"], name = "untrusted" },
    { allow = ["BSD-3-Clause"], name = "subtle" },
    { allow = ["MPL-2.0"], name = "option-ext" },
]

[[licenses.clarify]]
name = "ring"
expression = "Apache-2.0 AND ISC"
license-files = [
    { path = "LICENSE", hash = 0xbd0e7623 },
]

[[licenses.clarify]]
name = "hyper-rustls"
expression = "Apache-2.0 OR ISC OR MIT"
license-files = [{ path = "LICENSE-MIT", hash = 0x709e3175 }]

[[licenses.clarify]]
name = "rustls"
expression = "Apache-2.0 OR ISC OR MIT"
license-files = [{ path = "LICENSE-MIT", hash = 0x709e3175 }]

[[licenses.clarify]]
name = "rustls-webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x5b698ca1 }]

[[licenses.clarify]]
name = "webpki-roots"
expression = "CDLA-Permissive-2.0"
license-files = [{ path = "LICENSE", hash = 0xe2719938 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
allow-wildcard-paths = true
skip = [
    { name = "hashbrown", version = "=0.15.5" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
