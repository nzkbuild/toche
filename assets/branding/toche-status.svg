<svg xmlns="http://www.w3.org/2000/svg" width="920" height="48" viewBox="0 0 920 48" role="img" aria-labelledby="title desc">
  <title id="title">Toche project status</title>
  <desc id="desc">Version 1.0.7 with 65 built-in filters, duplicate requests coalesced from many calls to one, zero hosted Toche accounts, and 354 Rust tests.</desc>
  <defs>
    <linearGradient id="toche-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.34" stop-color="#a855f7"/>
      <stop offset="0.67" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <g fill="#111827" stroke="url(#toche-gradient)" stroke-width="1.5">
    <rect x="1" y="1" width="154" height="46" rx="10"/>
    <rect x="166" y="1" width="126" height="46" rx="10"/>
    <rect x="303" y="1" width="196" height="46" rx="10"/>
    <rect x="510" y="1" width="196" height="46" rx="10"/>
    <rect x="717" y="1" width="202" height="46" rx="10"/>
  </g>
  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" text-anchor="middle">
    <text x="78" y="29" fill="#f8fafc"><tspan fill="#94a3b8">VERSION</tspan><tspan dx="8" font-weight="700">1.0.7</tspan></text>
    <text x="229" y="29" fill="#f8fafc"><tspan fill="#94a3b8">FILTERS</tspan><tspan dx="8" font-weight="700">65</tspan></text>
    <text x="401" y="29" fill="#f8fafc"><tspan fill="#94a3b8">DUPLICATES</tspan><tspan dx="8" font-weight="700">N → 1</tspan></text>
    <text x="608" y="29" fill="#f8fafc"><tspan fill="#94a3b8">HOSTED ACCOUNTS</tspan><tspan dx="8" font-weight="700">0</tspan></text>
    <text x="818" y="29" fill="#f8fafc"><tspan fill="#94a3b8">RUST TESTS</tspan><tspan dx="8" font-weight="700">354</tspan></text>
  </g>
</svg>
