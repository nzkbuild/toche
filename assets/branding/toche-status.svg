<svg xmlns="http://www.w3.org/2000/svg" width="920" height="48" viewBox="0 0 920 48" role="img" aria-labelledby="title desc">
  <title id="title">Toche project status</title>
  <desc id="desc">Version 1.0.7, built with Rust, works with Claude Code, runs as a local gateway, licensed Apache-2.0.</desc>
  <defs>
    <linearGradient id="toche-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.34" stop-color="#a855f7"/>
      <stop offset="0.67" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <g fill="#111827" stroke="url(#toche-gradient)" stroke-width="1.5">
    <rect x="1" y="1" width="154" height="46" rx="10"/>
    <rect x="166" y="1" width="126" height="46" rx="10"/>
    <rect x="303" y="1" width="196" height="46" rx="10"/>
    <rect x="510" y="1" width="196" height="46" rx="10"/>
    <rect x="717" y="1" width="202" height="46" rx="10"/>
