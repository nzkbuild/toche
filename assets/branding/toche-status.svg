<svg xmlns="http://www.w3.org/2000/svg" width="920" height="48" viewBox="0 0 920 48" role="img" aria-labelledby="title desc">
  <title id="title">Toche runtime facts</title>
  <desc id="desc">Toche 1.1.1: one local runtime, two supported clients, two supported protocols, 65 built-in filters, eligible identical requests coalesced from N calls to 1, and zero hosted accounts.</desc>
  <defs>
    <linearGradient id="toche-gradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.34" stop-color="#a855f7"/>
      <stop offset="0.67" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <g fill="#111827" stroke="url(#toche-gradient)" stroke-width="1.5">
    <rect x="1" y="1" width="120" height="46" rx="10"/>
    <rect x="132" y="1" width="120" height="46" rx="10"/>
    <rect x="263" y="1" width="120" height="46" rx="10"/>
    <rect x="394" y="1" width="120" height="46" rx="10"/>
    <rect x="525" y="1" width="120" height="46" rx="10"/>
    <rect x="656" y="1" width="120" height="46" rx="10"/>
    <rect x="787" y="1" width="132" height="46" rx="10"/>
  </g>
  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">
    <text x="61" y="29" fill="#f8fafc"><tspan fill="#94a3b8">VERSION</tspan><tspan dx="6" font-weight="700">1.1.1</tspan></text>
    <text x="192" y="29" fill="#f8fafc"><tspan fill="#94a3b8">RUNTIME</tspan><tspan dx="6" font-weight="700">1</tspan></text>
    <text x="323" y="29" fill="#f8fafc"><tspan fill="#94a3b8">CLIENTS</tspan><tspan dx="6" font-weight="700">2</tspan></text>
    <text x="454" y="29" fill="#f8fafc"><tspan fill="#94a3b8">PROTOCOLS</tspan><tspan dx="6" font-weight="700">2</tspan></text>
    <text x="585" y="29" fill="#f8fafc"><tspan fill="#94a3b8">FILTERS</tspan><tspan dx="6" font-weight="700">65</tspan></text>
    <text x="716" y="29" fill="#f8fafc"><tspan fill="#94a3b8">DUPLICATES</tspan><tspan dx="6" font-weight="700">N → 1</tspan></text>
    <text x="853" y="29" fill="#f8fafc"><tspan fill="#94a3b8">ACCOUNTS</tspan><tspan dx="6" font-weight="700">0</tspan></text>
  </g>
</svg>
