    <text x="229" y="29" fill="#f8fafc"><tspan fill="#94a3b8">BUILT</tspan><tspan dx="8" font-weight="700">RUST</tspan></text>
    <text x="401" y="29" fill="#f8fafc"><tspan fill="#94a3b8">FOR</tspan><tspan dx="8" font-weight="700">CLAUDE CODE</tspan></text>
    <text x="608" y="29" fill="#f8fafc"><tspan fill="#94a3b8">RUNS</tspan><tspan dx="8" font-weight="700">LOCALLY</tspan></text>
    <text x="818" y="29" fill="#f8fafc"><tspan fill="#94a3b8">LICENSE</tspan><tspan dx="8" font-weight="700">APACHE-2.0</tspan></text>
