name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Format, lint, and test
    runs-on: ubuntu-latest
    env:
      TOCHE_CONFIG_DIR: ${{ github.workspace }}/.toche-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Prepare Rust toolchain
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Check dependency and licence policy
        run: |
          cargo install cargo-deny --version 0.20.2 --locked
          cargo deny check

      - name: Generate dependency attribution report
        run: |
          cargo install cargo-about --version 0.9.1 --locked --features cli
          cargo about generate about.hbs --fail -o /tmp/THIRD_PARTY_DEPENDENCIES.md

  windows:
    name: Test on Windows
    runs-on: windows-latest
    env:
      TOCHE_CONFIG_DIR: ${{ github.workspace }}/.toche-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Prepare Rust toolchain
        run: |
          rustup update stable
          rustup default stable

      - name: Prepare Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "18"
          package-manager-cache: false

      - name: Run tests
        run: cargo test --all-features --locked

      - name: Test npm installer on Windows
        run: npm run test:npm

  minimum-rust:
    name: Test minimum Rust 1.86
    runs-on: ubuntu-latest
    env:
      TOCHE_CONFIG_DIR: ${{ github.workspace }}/.toche-tests
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install minimum toolchain
        run: rustup toolchain install 1.86.0 --profile minimal

      - name: Run tests
        run: cargo +1.86.0 test --all-features --locked

  npm-package:
    name: Test npm package
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Prepare Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "18"
          package-manager-cache: false

      - name: Test installer logic
        run: npm run test:npm

      - name: Inspect publish contents
        run: npm run check:package
