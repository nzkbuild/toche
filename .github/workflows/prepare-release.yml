name: Prepare release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to package
        required: true
        default: v1.0.7
        type: string

permissions:
  contents: read

concurrency:
  group: prepare-release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate tagged source
    runs-on: ubuntu-latest
    env:
      TOCHE_CONFIG_DIR: ${{ runner.temp }}/toche-tests
    steps:
      - name: Check out release commit
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Verify tag and package version
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          cargo_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          test "$cargo_version" = "$version"

      - name: Prepare Rust toolchain
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --all-features --locked

  tag:
    name: Create verified tag
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out release commit
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Create or verify tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force

          if git rev-parse "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            tagged_commit="$(git rev-list -n 1 "$RELEASE_TAG")"
            test "$tagged_commit" = "$GITHUB_SHA" || {
              echo "Tag $RELEASE_TAG already points to $tagged_commit, not $GITHUB_SHA."
              exit 1
            }
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$RELEASE_TAG" -m "Toche $RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          fi

  draft:
    name: Create draft release
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out release notes
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Create or verify draft
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          notes="docs/releases/${RELEASE_TAG}.md"
          test -f "$notes"

          if state="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft 2>/dev/null)"; then
            test "$state" = "true" || {
              echo "Release $RELEASE_TAG is already published. Refusing to replace it."
              exit 1
            }
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --draft \
              --title "Toche $RELEASE_TAG" \
              --notes-file "$notes"
          fi

  package:
    name: Package ${{ matrix.target }}
    needs: draft
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            format: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            format: zip
          - os: macos-15-intel
            target: x86_64-apple-darwin
            format: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            format: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          ref: ${{ inputs.tag }}

      - name: Prepare Rust target
        shell: bash
        run: |
          rustup update stable
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          name="toche-${version}-${TARGET}"
          mkdir -p "dist/${name}"
          cp "target/${TARGET}/release/toche" "dist/${name}/"
          cp LICENSE README.md "dist/${name}/"
          tar -C dist -czf "dist/${name}.tar.gz" "$name"
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256")
          else
            (cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256")
          fi

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          $version = $env:RELEASE_TAG.TrimStart('v')
          $name = "toche-$version-$env:TARGET"
          $folder = "dist/$name"
          $archive = "dist/$name.zip"
          New-Item -ItemType Directory -Force -Path $folder | Out-Null
          Copy-Item "target/$env:TARGET/release/toche.exe" $folder
          Copy-Item LICENSE, README.md $folder
          Compress-Archive -Path $folder -DestinationPath $archive
          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          "$hash  $name.zip" | Set-Content -Encoding ascii "dist/$name.zip.sha256"

      - name: Upload assets to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: gh release upload "$RELEASE_TAG" dist/* --clobber

  summary:
    name: Review draft
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Report next step
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          echo "Draft release $RELEASE_TAG is ready for a human review."
          echo "Verify all four archives and checksums before publishing it."
